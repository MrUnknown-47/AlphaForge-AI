name: Docker Build Validation

on:
  push:
    branches: [ main ]

jobs:
  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build backend container
        run: |
          docker build -t alphaforge-backend:latest ./backend
      - name: Build frontend container
        run: |
          docker build -t alphaforge-frontend:latest ./frontend
